<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZPrompt - Generador de Prompts para Desarrollo de Software</title>
    <meta name="description" content="Genera prompts estructurados para GLM optimizados para desarrollo de software.">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-sans/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/manrope@1/dist/fonts/manrope/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-background text-foreground font-sans antialiased">

    <header class="sticky top-0 z-50 w-full border-b border-border bg-background/80 backdrop-blur-sm">
        <div class="mx-auto flex h-14 max-w-4xl items-center px-4 sm:px-6">
            <div class="flex-1"></div>
            <a href="/" class="flex items-center text-xl font-semibold tracking-wider" style="flex-direction:column">
                <span>ZPROMPT</span>
                <span class="block text-xs font-normal text-muted-foreground tracking-normal" style="margin-top:2px">Genera prompts estructurados para GLM</span>
            </a>
            <div class="flex-1 flex items-center justify-end gap-3">
                <button id="theme-toggle" class="inline-flex items-center justify-center rounded-md border border-border bg-background p-2 text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground cursor-pointer">
                    <i data-lucide="sun" id="theme-icon-sun" class="h-4 w-4"></i>
                    <i data-lucide="moon" id="theme-icon-moon" class="h-4 w-4 hidden"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-4xl px-4 py-8 sm:px-6 sm:py-12">

        <section class="space-y-6">

            <div>
                <div class="grid grid-cols-4 gap-2">
                    <button data-type="system" class="prompt-type-card flex items-center justify-center gap-2 rounded-lg border border-border bg-card px-3 py-2 transition-all hover:border-ring hover:shadow-sm cursor-pointer">
                        <i data-lucide="monitor" class="h-5 w-5"></i>
                        <span class="text-xs font-medium text-card-foreground">SYSTEM</span>
                    </button>
                    <button data-type="start" class="prompt-type-card flex items-center justify-center gap-2 rounded-lg border border-border bg-card px-3 py-2 transition-all hover:border-ring hover:shadow-sm cursor-pointer">
                        <i data-lucide="rocket" class="h-4 w-4"></i>
                        <span class="text-xs font-medium text-card-foreground">START</span>
                    </button>
                    <button data-type="followup" class="prompt-type-card flex items-center justify-center gap-2 rounded-lg border border-border bg-card px-3 py-2 transition-all hover:border-ring hover:shadow-sm cursor-pointer">
                        <i data-lucide="repeat" class="h-5 w-5"></i>
                        <span class="text-xs font-medium text-card-foreground">FOLLOW-UP</span>
                    </button>
                    <button data-type="debug" class="prompt-type-card flex items-center justify-center gap-2 rounded-lg border border-border bg-card px-3 py-2 transition-all hover:border-ring hover:shadow-sm cursor-pointer">
                        <i data-lucide="bug" class="h-4 w-4"></i>
                        <span class="text-xs font-medium text-card-foreground">DEBUG</span>
                    </button>
                </div>
            </div>

            <div>
                <label for="user-input" class="mb-2 block text-sm text-muted-foreground text-center">Describe tu proyecto y obtiene prompts optimizados para desarrollo de software.</label>
                <textarea
                    id="user-input"
                    rows="4"
                    class="flex w-full rounded-lg border border-input bg-background px-3 py-2.5 text-sm shadow-xs transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring resize-none"
                    placeholder="Ejemplo: Crear una API REST con Python y FastAPI para gestion de tareas, con autenticacion JWT y base de datos PostgreSQL..."
                ></textarea>
            </div>

            <div class="grid grid-cols-1 gap-4 sm:grid-cols-3">
                <div>
                    <label for="language-select" class="mb-2 block text-sm font-medium text-muted-foreground">Lenguaje (opcional)</label>
                    <select id="language-select" class="flex h-9 w-full rounded-lg border border-input bg-background px-3 text-sm shadow-xs transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring">
                        <option value="">Auto-detectar</option>
                        <option value="Python">Python</option>
                        <option value="TypeScript">TypeScript</option>
                        <option value="Dart">Dart</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="Rust">Rust</option>
                        <option value="Go">Go</option>
                        <option value="Java">Java</option>
                        <option value="C#">C#</option>
                        <option value="PHP">PHP</option>
                        <option value="Ruby">Ruby</option>
                        <option value="Swift">Swift</option>
                        <option value="Kotlin">Kotlin</option>
                    </select>
                </div>
                <div>
                    <label for="framework-select" class="mb-2 block text-sm font-medium text-muted-foreground">Framework (opcional)</label>
                    <select id="framework-select" class="flex h-9 w-full rounded-lg border border-input bg-background px-3 text-sm shadow-xs transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring">
                        <option value="">Ninguno / Auto</option>
                        <option value="FastAPI">FastAPI</option>
                        <option value="Django">Django</option>
                        <option value="Flutter">Flutter</option>
                        <option value="Flask">Flask</option>
                        <option value="Next.js">Next.js</option>
                        <option value="React">React</option>
                        <option value="Vue.js">Vue.js</option>
                        <option value="Express">Express</option>
                        <option value="NestJS">NestJS</option>
                        <option value="Spring Boot">Spring Boot</option>
                        <option value="Actix">Actix</option>
                        <option value="Axum">Axum</option>
                        <option value="Laravel">Laravel</option>
                        <option value="Rails">Rails</option>
                    </select>
                </div>
                <div>
                    <label for="database-select" class="mb-2 block text-sm font-medium text-muted-foreground">Base de datos (opcional)</label>
                    <select id="database-select" class="flex h-9 w-full rounded-lg border border-input bg-background px-3 text-sm shadow-xs transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring">
                        <option value="">Ninguna / Auto</option>
                        <option value="Supabase">Supabase (web/API)</option>
                        <option value="Firebase">Firebase (apps moviles)</option>
                        <option value="PostgreSQL">PostgreSQL</option>
                        <option value="MySQL">MySQL</option>
                        <option value="MongoDB">MongoDB</option>
                        <option value="SQLite">SQLite</option>
                        <option value="Redis">Redis</option>
                        <option value="MariaDB">MariaDB</option>
                        <option value="PlanetScale">PlanetScale</option>
                        <option value="CockroachDB">CockroachDB</option>
                    </select>
                </div>
            </div>

            <button
                id="generate-btn"
                class="inline-flex w-full items-center justify-center gap-2 rounded-lg bg-primary px-4 py-2.5 text-sm font-medium text-primary-foreground shadow-xs transition-colors hover:bg-primary/90 disabled:pointer-events-none disabled:opacity-50 cursor-pointer"
                disabled
            >
                <i data-lucide="zap" class="h-4 w-4"></i>
                <span id="btn-text">Generar Prompt</span>
                <span id="btn-spinner" class="hidden">
                    <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                </span>
            </button>

        </section>

        <section id="error-section" class="mt-6 hidden">
            <div class="rounded-lg border border-destructive/50 bg-destructive/10 p-4 text-sm text-destructive">
                <p id="error-message"></p>
            </div>
        </section>

        <section id="result-section" class="mt-8 hidden">
            <div class="rounded-lg border border-border bg-card shadow-sm">
                <div class="flex items-center justify-between border-b border-border px-4 py-3">
                    <div class="flex items-center gap-2">
                        <span id="result-icon"></span>
                        <h2 id="result-title" class="text-sm font-semibold text-card-foreground"></h2>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="copy-btn" class="inline-flex items-center gap-1.5 rounded-md border border-border bg-background px-2.5 py-1.5 text-xs font-medium text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground cursor-pointer">
                            <i data-lucide="copy" class="h-3.5 w-3.5"></i>
                            Copiar
                        </button>
                        <button id="regenerate-btn" class="inline-flex items-center gap-1.5 rounded-md border border-border bg-background px-2.5 py-1.5 text-xs font-medium text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground cursor-pointer">
                            <i data-lucide="refresh-cw" class="h-3.5 w-3.5"></i>
                            Regenerar
                        </button>
                    </div>
                </div>
                <div class="p-4">
                    <pre id="result-content" class="whitespace-pre-wrap break-words font-mono text-sm leading-relaxed text-card-foreground"></pre>
                </div>
                <div class="border-t border-border px-4 py-2">
                    <p id="result-timestamp" class="text-xs text-muted-foreground"></p>
                </div>
            </div>
        </section>

    </main>

    <footer class="border-t border-border py-6 text-center text-xs text-muted-foreground">
        <div id="peak-info"></div>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
